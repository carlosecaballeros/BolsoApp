<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrar Pago - BolsoApp</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .header-pago { background: var(--blue); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--gray); font-size: 14px; }
        select, input { 
            width: 100%; padding: 16px; border-radius: 16px; border: 2px solid #E4E6EB; 
            font-size: 16px; outline: none; background: var(--white);
        }
        select:focus, input:focus { border-color: var(--blue); }
        .currency-input { position: relative; }
        .currency-input::before { content: "Bs."; position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-weight: bold; color: var(--blue); }
        .currency-input input { padding-left: 50px; }
    </style>
</head>
<body>

    <div class="header-pago">
        <h2 style="margin:0">Registrar Abono</h2>
        <p style="margin:5px 0 0; opacity:0.8">Completa los datos del pago</p>
    </div>

    <div class="mobile-container" style="margin-top: 20px;">
        <div class="card">
            <form id="pagoForm">
                <div class="form-group">
                    <label>Seleccionar Bolso (Grupo)</label>
                    <select id="selectGrupo" required>
                        <option value="">Cargando tus grupos...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Monto a abonar</label>
                    <div class="currency-input">
                        <input type="number" id="monto" step="0.01" placeholder="0,00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Número de Referencia (Opcional)</label>
                    <input type="text" id="referencia" placeholder="Ej: 123456">
                </div>

                <button type="submit" class="btn-primary" id="btnConfirmar">Confirmar Pago</button>
                <button type="button" class="btn-primary" style="background:#eee; color:#666; margin-top:10px;" onclick="window.location.href='dashboard.html'">Cancelar</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, addDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userUID = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUID = user.uid;
                cargarGrupos(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        // 1. Cargar los grupos donde el usuario participa
        async function cargarGrupos(uid) {
            const select = document.getElementById('selectGrupo');
            const q = query(collection(db, "participantes_grupo"), where("usuarioId", "==", uid));
            const snap = await getDocs(q);
            
            select.innerHTML = '<option value="">Selecciona un grupo</option>';
            
            for (const docP of snap.docs) {
                const gSnap = await getDoc(doc(db, "grupos", docP.data().grupoId));
                if (gSnap.exists()) {
                    const g = gSnap.data();
                    const option = document.createElement('option');
                    option.value = docP.data().grupoId;
                    option.text = `${g.nombre} (Semana ${g.semanaActual})`;
                    select.appendChild(option);
                }
            }
        }

        // 2. Guardar el pago
        document.getElementById('pagoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnConfirmar');
            btn.disabled = true;
            btn.innerText = "Procesando...";

            const monto = parseFloat(document.getElementById('monto').value);
            const grupoId = document.getElementById('selectGrupo').value;
            const ref = document.getElementById('referencia').value;

            try {
                // Crear el registro en la colección 'movimientos'
                await addDoc(collection(db, "movimientos"), {
                    usuarioId: userUID,
                    grupoId: grupoId,
                    monto: monto,
                    referencia: ref,
                    fecha: serverTimestamp(),
                    tipo: "abono",
                    saldoPosterior: monto // Aquí luego haremos lógica de suma si es necesario
                });

                alert("¡Pago registrado con éxito!");
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                alert("Error al registrar el pago");
                btn.disabled = false;
                btn.innerText = "Confirmar Pago";
            }
        });
    </script>
</body>
</html>
