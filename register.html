<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BolsoApp - Registro</title>
    <style>
        :root { --blue: #2D5AFE; --bg: #F0F2F5; --text: #1C1E21; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }
        .card { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 28px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        h2 { margin: 0 0 10px; text-align: center; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 10px; 
            border: 1px solid #E4E6EB; 
            border-radius: 14px; 
            font-size: 15px; 
            background: #F7F8FA; 
        }
        .btn-primary { 
            width: 100%; 
            padding: 16px; 
            background: var(--blue); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            margin-top: 10px;
        }
        .link { text-align: center; color: var(--blue); text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Crea tu cuenta</h2>
        <form id="regForm">
            <input type="text" id="fullName" placeholder="Nombre y Apellido" required>
            <input type="text" id="cedula" placeholder="Cédula de Identidad" required>
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña (mín. 6 caracteres)" required>
            <button type="submit" class="btn-primary">Registrarse</button>
        </form>
        <a href="login.html" class="link">¿Ya tienes cuenta? Inicia sesión</a>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);
                await setDoc(doc(db, "usuarios", cred.user.uid), {
                    name: fullName.value,
                    cedula: cedula.value,
                    email: email.value
                });
                window.location.href = "bienvenida.html";
            } catch (err) { alert("Error: " + err.message); }
        });
    </script>
</body>
</html>
