<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inicio - BolsoApp</title>
    <style>
        /* [Tus estilos de antes...] */
        :root { --primary: #2D5AFE; --bg: #F8FAFC; --card: #FFFFFF; --text-main: #1E293B; --text-muted: #64748B; --border: #E2E8F0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; display: none; } /* OCULTAMOS TODO EL BODY POR DEFECTO */
        
        /* Pantalla de carga */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; 
        }
    </style>
</head>
<body>
    <div id="loader">
        <div style="text-align: center;">
            <img src="assets/BolsoApp.png" style="width: 80px; margin-bottom: 10px;">
            <p>Verificando sesión...</p>
        </div>
    </div>

    <div class="container">
        <header style="margin-bottom: 25px;">
            <h1>Hola, <span id="userName">...</span> 👋</h1>
            <p style="color: var(--text-muted);">Este es el estado de tu ahorro.</p>
        </header>

        <div class="balance-card">
            <p class="balance-label">Total en mis Bolsos</p>
            <p class="balance-amount" id="totalAhorro">$0.00</p>
        </div>
    </div>

    <nav class="tab-bar">
        <a href="dashboard.html" class="tab-item active"><span class="tab-icon">🏠</span>Inicio</a>
        <a href="profile.html" class="tab-item"><span class="tab-icon">⚙️</span>Perfil</a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loader = document.getElementById('loader');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("Usuario detectado:", user.uid);
                
                // 1. Buscamos los datos en Firestore
                try {
                    const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                    if (docSnap.exists()) {
                        document.getElementById('userName').innerText = docSnap.data().nombre;
                    }
                } catch (e) { console.error(e); }

                // 2. MOSTRAR LA PÁGINA Y QUITAR EL LOADER
                document.body.style.display = "block";
                loader.style.display = "none";

            } else {
                // Si realmente no hay usuario, mandamos al index
                console.log("No hay sesión, redirigiendo...");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
