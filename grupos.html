<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grupos - BolsoApp</title>
    <style>
        :root { --blue: #2D5AFE; --bg: #F0F2F5; --white: #ffffff; --text: #1C1E21; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header-simple { padding: 40px 20px 20px; font-size: 24px; font-weight: 800; }
        .container { padding: 0 16px; }
        .group-card { background: white; padding: 20px; border-radius: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-join { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 700; }
        /* Reutilizar Nav Bar del Dashboard */
    </style>
</head>
<body>
    <div class="header-simple">Explorar Grupos</div>
    <div class="container">
        <div class="group-card">
            <div>
                <b style="font-size: 18px;">Bolso $100</b>
                <p style="margin:5px 0; color:#8E8E93;">Cuota: Bs. 360 / semana</p>
            </div>
            <button class="btn-join">Unirse</button>
        </div>
        <div class="group-card">
            <div>
                <b style="font-size: 18px;">Bolso $300</b>
                <p style="margin:5px 0; color:#8E8E93;">Cuota: Bs. 1.080 / semana</p>
            </div>
            <button class="btn-join">Unirse</button>
        </div>
    </div>
    </body>
</html>
