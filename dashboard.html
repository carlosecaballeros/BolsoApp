<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Grupos</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="mobile-container">
        <h2 class="section-title">Bolsos en formación</h2>
        <div id="groupsList"></div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span><span>Inicio</span></a>
        <a href="historial.html" class="nav-item"><span>🕒</span><span>Historial</span></a>
        <a href="grupos.html" class="nav-item nav-item-center active"><span>+</span></a>
        <a href="avisos.html" class="nav-item"><span>🔔</span><span>Avisos</span></a>
        <a href="perfil.html" class="nav-item"><span>👤</span><span>Perfil</span></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onSnapshot(collection(db, "grupos"), (snap) => {
            const list = document.getElementById('groupsList');
            list.innerHTML = "";
            snap.forEach(docG => {
                const g = docG.data();
                list.innerHTML += `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b>${g.nombre}</b><br>
                            <small>Cuota: $${g.monto / 10} | ${g.participantesActuales}/10</small>
                        </div>
                        <button class="btn-primary" style="width:auto; padding:10px 15px;" onclick="unirse('${docG.id}')">Unirse</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
