<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel BolsoApp</title>
    <style>
        :root { --blue: #2D5AFE; --bg: #f4f7f6; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: none; }
        .header { background: var(--blue); color: white; padding: 30px 20px; border-radius: 0 0 25px 25px; text-align: center; }
        .card { background: white; margin: -20px 15px 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .balance { font-size: 28px; font-weight: bold; color: var(--blue); margin: 10px 0; }
        .group-item { background: #eef2ff; padding: 12px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--blue); }
        .logout-btn { background: #ff4757; color: white; border: none; padding: 12px; width: 80%; border-radius: 10px; margin: 20px auto; display: block; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Hola, <span id="userName">Cargando...</span></h1>
        <p id="userCedula" style="opacity: 0.8; font-size: 14px;"></p>
    </div>

    <div class="card">
        <p style="color: #64748b; font-size: 14px; margin: 0;">Saldo Actual</p>
        <div class="balance" id="userBalance">$0.00</div>
        <small id="statusSaldo" style="color: #94a3b8; font-size: 10px;"></small>
    </div>

    <div class="card">
        <h3>Mis Grupos (Bolsos)</h3>
        <div id="groupsList"><p style="font-size: 13px; color: #94a3b8;">Buscando tus grupos...</p></div>
    </div>

    <button class="logout-btn" onclick="salir()">Cerrar Sesión</button>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, collection, query, where, getDocs, limit, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.body.style.display = "block";
                console.log("Usuario conectado ID:", user.uid);
                
                try {
                    // 1. Cargar Perfil
                    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
                    if (userSnap.exists()) {
                        document.getElementById('userName').innerText = userSnap.data().name || "Usuario";
                        document.getElementById('userCedula').innerText = "C.I: " + (userSnap.data().cedula || "N/A");
                    }

                    // 2. Cargar Saldo en Tiempo Real
                    const qMov = query(
                        collection(db, "movimientos"), 
                        where("usuarioId", "==", user.uid), 
                        orderBy("saldoPosterior", "desc"), 
                        limit(1)
                    );

                    onSnapshot(qMov, (snap) => {
                        if (!snap.empty) {
                            snap.forEach(d => {
                                document.getElementById('userBalance').innerText = "$" + d.data().saldoPosterior.toLocaleString();
                                document.getElementById('statusSaldo').innerText = "Actualizado";
                            });
                        } else {
                            document.getElementById('statusSaldo').innerText = "No se encontraron movimientos para este ID";
                        }
                    });

                    // 3. Cargar Grupos
                    const qPart = query(collection(db, "participantes_grupo"), where("usuarioId", "==", user.uid));
                    onSnapshot(qPart, async (snapPart) => {
                        const listHtml = document.getElementById('groupsList');
                        if (snapPart.empty) {
                            listHtml.innerHTML = "<p>No tienes grupos activos.</p>";
                        } else {
                            listHtml.innerHTML = "";
                            for (const docPart of snapPart.docs) {
                                const gSnap = await getDoc(doc(db, "grupos", docPart.data().grupoId));
                                if (gSnap.exists()) {
                                    const gData = gSnap.data();
                                    listHtml.innerHTML += `
                                        <div class="group-item">
                                            <b>${gData.nombre}</b><br>
                                            <small>Monto: $${gData.monto} | Sem: ${gData.semanaActual}</small>
                                        </div>`;
                                }
                            }
                        }
                    });

                } catch (e) { console.error("Error general:", e); }
            } else { window.location.href = "login.html"; }
        });

        window.salir = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
