<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BolsoApp</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="mobile-container">
        <header style="margin-bottom: 20px;">
            <h1 style="color:var(--blue); margin:0;">Hola, <span id="userName">...</span></h1>
            <p id="userCedula" style="color:var(--gray);"></p>
        </header>

        <div class="section-title"><b>Mis Bolsos Activos</b></div>
        <div id="activeGroupsContainer">
            <p style="color:var(--gray)">Buscando tus grupos...</p>
        </div>

        <button id="btnRegistrar" class="btn-primary" style="display:none; margin-top:20px;" onclick="location.href='pagos.html'">
            Registrar mi pago
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span>🏠</span><span>Inicio</span></a>
        <a href="historial.html" class="nav-item"><span>🕒</span><span>Historial</span></a>
        <a href="grupos.html" class="nav-item nav-item-center"><span>+</span></a>
        <a href="avisos.html" class="nav-item"><span>🔔</span><span>Avisos</span></a>
        <a href="perfil.html" class="nav-item"><span>👤</span><span>Perfil</span></a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Datos del usuario
                const uSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (uSnap.exists()) {
                    document.getElementById('userName').innerText = uSnap.data().name.split(' ')[0];
                    document.getElementById('userCedula').innerText = "C.I: " + uSnap.data().cedula;
                }

                // Cargar grupos en los que participa
                const q = query(collection(db, "participantes_grupo"), where("usuarioId", "==", user.uid));
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('activeGroupsContainer');
                    const btn = document.getElementById('btnRegistrar');
                    container.innerHTML = snapshot.empty ? "<p>No te has unido a ningún grupo aún.</p>" : "";
                    btn.style.display = snapshot.empty ? "none" : "block";

                    snapshot.forEach(async (docP) => {
                        const gSnap = await getDoc(doc(db, "grupos", docP.data().grupoId));
                        if(gSnap.exists()){
                            const g = gSnap.data();
                            container.innerHTML += `
                                <div class="card">
                                    <b>${g.nombre}</b><br>
                                    <small>Progreso: ${g.participantesActuales}/${g.participantesMax}</small>
                                    <div style="background:#eee; height:8px; border-radius:4px; margin-top:8px;">
                                        <div style="background:var(--blue); width:${(g.participantesActuales/g.participantesMax)*100}%; height:100%; border-radius:4px;"></div>
                                    </div>
                                </div>`;
                        }
                    });
                });
            } else { location.href = 'login.html'; }
        });
    </script>
</body>
</html>
