<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - BolsoApp</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="mobile-container">
        <header style="margin-bottom: 20px;">
            <h2 style="margin:0;">Hola, <span id="userName">...</span></h2>
            <p id="userCedula" style="color:var(--gray); margin:5px 0;"></p>
        </header>

        <div id="activeGroups">
            <p style="color:var(--gray)">No tienes bolsos activos todavía.</p>
        </div>

        <button id="btnPago" class="btn-primary" style="display:none; margin-top:20px;" onclick="window.location.href='pagos.html'">
            Registrar Pago de Hoy
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span>🏠</span><span>Inicio</span></a>
        <a href="historial.html" class="nav-item"><span>🕒</span><span>Historial</span></a>
        <a href="grupos.html" class="nav-item nav-item-center"><span>+</span></a>
        <a href="avisos.html" class="nav-item"><span>🔔</span><span>Avisos</span></a>
        <a href="perfil.html" class="nav-item"><span>👤</span><span>Perfil</span></a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (uSnap.exists()) {
                    document.getElementById('userName').innerText = uSnap.data().name;
                    document.getElementById('userCedula').innerText = "V-" + uSnap.data().cedula;
                }

                // Lógica de Botón de Pago
                const q = query(collection(db, "participantes_grupo"), where("usuarioId", "==", user.uid));
                onSnapshot(q, (snap) => {
                    document.getElementById('btnPago').style.display = snap.empty ? "none" : "block";
                });
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
